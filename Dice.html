    #hideMe {
        animation: cssAnimation 0s ease-in 5s forwards;

        animation-fill-mode: forwards;

    }
    @keyframes cssAnimation {
        to {
            width:0;
            height:0;
            overflow:hidden;
        }
    }
    @-webkit-keyframes cssAnimation {
        to {
            width:0;
            height:0;
            visibility:hidden;
        }
    }
        .sticky {
      position: -webkit-sticky;
      position: sticky;
      top: 0;
      padding: 5px;
      border: 2px solid #000000;
    }
