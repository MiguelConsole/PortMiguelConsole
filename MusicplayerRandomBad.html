    <div class="really-player">
        <audio class="player"></audio>
    </div>
    <script>
    (function(){
        const tracks = [
            'https://miguelconsole.github.io/Music/Bean.mp3',
            'https://miguelconsole.github.io/Music/Itachiii, Mangekyou in the Eyes.mp3',
            'https://miguelconsole.github.io/Music/Mort.mp3',
            'https://miguelconsole.github.io/Music/Cartman.mp3',
            'https://miguelconsole.github.io/Music/Peter.mp3',
            'https://miguelconsole.github.io/Music/Terartia.mp3'
        ];
        const container = document.querySelector('.really-player');
        const audio = container ? container.querySelector('.player') : null;
        if (!audio) return;

        const pick = tracks[Math.floor(Math.random() * tracks.length)];
        audio.src = encodeURI(pick);
        audio.loop = true;
        audio.volume = 0.3;

        const volumeSlider = document.getElementById('volumeSlider') || document.querySelector('input[type="range"]');
        if (volumeSlider) {
            volumeSlider.addEventListener('input', function(){
                audio.volume = this.value / 100;
            });
        }

        function startAudio(){
            const p = audio.play();
            if (p !== undefined) p.catch(()=>{});
        }

        const hide = document.getElementById('hideMe');
        if (hide) {
            const onEnd = function(){
                startAudio();
                hide.removeEventListener('animationend', onEnd);
                hide.removeEventListener('webkitAnimationEnd', onEnd);
            };
            hide.addEventListener('animationend', onEnd);
            hide.addEventListener('webkitAnimationEnd', onEnd);
        } else {
            startAudio();
        }
    })();
    </script>
